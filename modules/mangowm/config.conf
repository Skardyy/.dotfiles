# === Environment ===
env=CONFIG_TERMINAL_APP,ghostty
env=CONFIG_BROWSER_APP,zen-beta
env=CONIFG_COLOR_PICKER_APP,hyprpicker -a
env=CONFIG_SCREENSHOT_APP,grim -g "$(slurp)" - | wl-copy
env=CONFIG_SCREENSHOT_EDIT_APP,grim -g "$(slurp)" - | satty -f -
env=CONFIG_APP_LAUNCHER,noctalia-shell ipc call launcher toggle
env=CONFIG_CONTROL_CENTER_APP,missioncenter
env=CONFIG_CLIPBOARD_HISTORY_APP,noctalia-shell ipc call launcher clipboard
env=CONFIG_FILE_MANAGER_APP,nautilus
env=CONFIG_WALLPAPER_SWITCHER_APP,noctalia-shell ipc call wallpaper toggle

env=DMS_SCREENSHOT_EDITOR,satty

env=XDG_CURRENT_DESKTOP,gnome
env=XDG_SESSION_TYPE,wayland

env=__GL_GSYNC_ALLOWED,1
env=__GL_VRR_ALLOWED,1
env=LIBVA_DRIVER_NAME,nvidia
env=__GLX_VENDOR_LIBRARY_NAME,nvidia
env=ELECTRON_OZONE_PLATFORM_HINT,auto
env=NVD_BACKEND,direct
env=GBM_BACKEND,nvidia-drm
env=WLR_NO_HARDWARE_CURSORS,1

# === Autostart ===
exec-once=noctalia-shell

# === Includes ===
source=./modules/input.conf
source=./modules/look.conf

source-optional=./dms/outputs.conf
