# === Keyboard ===
xkb_rules_layout=us,il
xkb_rules_options=grp:alt_space_toggle
repeat_delay=250
repeat_rate=30

# === Mouse ===
mouse_accel_profile=1

# === Trackpad ===
trackpad_accel_profile=1
trackpad_natural_scrolling=1
tap_to_click=1
disable_while_typing=1

# === Apps ===
bind=SUPER,Return,spawn_shell,$CONFIG_TERMINAL_APP
bind=SUPER,S,spawn_shell,$CONFIG_SCREENSHOT_APP
bind=SUPER+SHIFT,S,spawn_shell,$CONFIG_SCREENSHOT_EDIT_APP
bind=SUPER+SHIFT,C,spawn_shell,$CONIFG_COLOR_PICKER_APP
bind=SUPER,Space,spawn_shell,$CONFIG_APP_LAUNCHER
bind=SUPER,W,spawn_shell,$CONFIG_BROWSER_APP
bind=SUPER+SHIFT,W,spawn_shell,$CONFIG_WALLPAPER_SWITCHER_APP
bind=SUPER,E,spawn_shell,$CONFIG_FILE_MANAGER_APP
bind=CTRL+SHIFT,Escape,spawn_shell,$CONFIG_CONTROL_CENTER_APP
bind=SUPER,V,spawn_shell,$CONFIG_CLIPBOARD_HISTORY_APP

# === Overview ===
bind=SUPER,Tab,toggleoverview

# === Window Management ===
bind=SUPER,Q,killclient
bind=SUPER,F,togglefullscreen

# === Focus Navigation ===
bind=SUPER,Left,focusdir,left
bind=SUPER,Down,focusdir,down
bind=SUPER,Up,focusdir,up
bind=SUPER,Right,focusdir,right
bind=SUPER,H,focusdir,left
bind=SUPER,J,focusdir,down
bind=SUPER,K,focusdir,up
bind=SUPER,L,focusdir,right

# === Window Movement ===
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,H,exchange_client,left
bind=SUPER+SHIFT,J,exchange_client,down
bind=SUPER+SHIFT,K,exchange_client,up
bind=SUPER+SHIFT,L,exchange_client,right

# === Monitor Navigation ===
bind=SUPER+CTRL,Left,focusmon,left
bind=SUPER+CTRL,Right,focusmon,right
bind=SUPER+CTRL,H,focusmon,left
bind=SUPER+CTRL,L,focusmon,right

# === Tags (workspaces) ===
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

# === View additional tags (overlay) ===
bind=ALT,1,toggleview,1
bind=ALT,2,toggleview,2
bind=ALT,3,toggleview,3
bind=ALT,4,toggleview,4
bind=ALT,5,toggleview,5
bind=ALT,6,toggleview,6
bind=ALT,7,toggleview,7
bind=ALT,8,toggleview,8
bind=ALT,9,toggleview,9

# === Move window to tag ===
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

# === Config reload ===
bind=SUPER+SHIFT,R,reload_config

# === Mouse drag ===
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
